<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Homely Exquisite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="logo"><i class="fas fa-home"></i> Homely<span>Exquisite</span></a>
            <div class="nav-menu-wrapper">
                <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<section class="section">
    <div class="form-wrap">
        <h2 style="text-align: center; margin-bottom: 10px;">Reset Your <span class="gold-text">Password</span></h2>
        <p style="text-align: center; font-size: 13px; color: #999; margin-bottom: 30px;">Enter your new password below</p>

        <div id="alertBox"></div>

        <div class="form-group">
            <label>New Password *</label>
            <div style="position: relative;">
                <input type="password" id="password" placeholder="Min 6 characters">
                <span onclick="togglePasswordVisibility('password')" style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--gold);">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </span>
            </div>
            <div id="passwordStrength" style="margin-top: 8px; font-size: 12px;"></div>
        </div>

        <div class="form-group">
            <label>Confirm Password *</label>
            <div style="position: relative;">
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
                <span onclick="togglePasswordVisibility('confirmPassword')" style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--gold);">
                    <i class="fas fa-eye" id="eyeIcon2"></i>
                </span>
            </div>
        </div>

        <button class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;" onclick="handlePasswordReset()">
            <i class="fas fa-key"></i> Reset Password
        </button>

        <p style="text-align: center; margin-top: 20px; font-size: 13px;">
            Remember your password? <a href="login.html" style="color: var(--gold); text-decoration: none;">Login here</a>
        </p>
    </div>
</section>

<footer>
    <div class="container">
        <div style="text-align: center;">
            <p><strong>Homely Exquisite</strong> | CEO: ALEX MOMOH</p>
            <p style="font-size: 12px; color: var(--gold);">📞 0706 522 9950</p>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
function togglePasswordVisibility(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = fieldId === 'password' ? document.getElementById('eyeIcon') : document.getElementById('eyeIcon2');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

document.getElementById('password').addEventListener('input', () => {
    const password = document.getElementById('password').value;
    const strength = document.getElementById('passwordStrength');
    
    if (password.length === 0) {
        strength.innerHTML = '';
    } else if (password.length < 6) {
        strength.innerHTML = '<span style="color: #dc3545;">❌ Weak - Min 6 characters</span>';
    } else if (password.length < 10) {
        strength.innerHTML = '<span style="color: #ffc107;">⚠️ Fair password</span>';
    } else {
        strength.innerHTML = '<span style="color: #28a745;">✅ Strong password</span>';
    }
});

function showAlert(msg, type = 'success') {
    const alertBox = document.getElementById('alertBox');
    const div = document.createElement('div');
    div.className = `alert ${type}`;
    div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
    alertBox.innerHTML = '';
    alertBox.appendChild(div);
    setTimeout(() => div.remove(), 5000);
}

async function handlePasswordReset() {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!password || !confirmPassword) {
        showAlert('Both password fields are required', 'error');
        return;
    }

    if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'error');
        return;
    }

    if (password !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
    }

    try {
        const btn = document.querySelector('.btn-primary');
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span> Resetting...';

        // Get user from hash
        const user = await checkUser();
        if (!user) {
            showAlert('Session expired. Please request a new password reset email.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            return;
        }

        // Update password
        await updateUserProfile({});
        const { error } = await window.supabase.auth.updateUser({ password: password });

        if (error) throw error;

        showAlert('✅ Password reset successful! Redirecting to login...', 'success');
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
    } catch (err) {
        showAlert('Error: ' + (err.message || 'Password reset failed'), 'error');
        document.querySelector('.btn-primary').disabled = false;
        document.querySelector('.btn-primary').innerHTML = '<i class="fas fa-key"></i> Reset Password';
    }
}

document.getElementById('menuToggle')?.addEventListener('click', () => {
    document.querySelector('.nav-links').classList.toggle('active');
});
</script>

</body>
</html>
