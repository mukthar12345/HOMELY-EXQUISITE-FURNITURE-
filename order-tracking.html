<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Order Tracking | Homely Exquisite</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><link rel="stylesheet" href="style.css"></head><body>
<header><div class="container"><nav class="navbar"><a href="index.html" class="logo"><i class="fas fa-home"></i> Homely<span>Exquisite</span></a><div class="nav-menu-wrapper"><button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="dashboard.html">Dashboard</a></li></ul></div></nav></div></header>
<section class="section"><div class="container"><h2>Order <span class="gold-text">Tracking</span></h2><div id="trackingContent" style="background:var(--navy-light);padding:30px;border-radius:15px;"></div><div style="text-align:center;margin-top:30px;"><p style="font-size:13px;color:#999;">Need help? Contact us:</p><p><a href="https://wa.me/2347065229950" style="color:var(--gold);text-decoration:none;"><i class="fab fa-whatsapp"></i> WhatsApp: 0706 522 9950</a></p></div></div></section>
<footer><div class="container"><p style="text-align:center;font-size:13px;">&copy; 2024 Homely Exquisite | CEO: ALEX MOMOH</p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script><script>async function loadTracking(){const params=new URLSearchParams(window.location.search);const orderId=params.get('id');if(!orderId){document.getElementById('trackingContent').innerHTML='<p style="color:#999;">No order ID provided</p>';return;}try{const orders=await getOrders();const order=orders.find(o=>o.id==orderId);if(!order){document.getElementById('trackingContent').innerHTML='<p style="color:#999;">Order not found</p>';return;}const statuses=['pending','confirmed','shipped','delivered'];const currentIndex=statuses.indexOf(order.status);document.getElementById('trackingContent').innerHTML=`<h3>${order.order_number}</h3><p style="color:var(--gold);margin:10px 0;">Status: ${order.status.toUpperCase()}</p><div style="margin:30px 0;">${statuses.map((s,i)=>`<div style="margin:15px 0;"><p style="color:${i<=currentIndex?'var(--gold)':'#666'};font-weight:600;"><i class="fas fa-${i<=currentIndex?'check-circle':'circle'}"></i> ${s.toUpperCase()}</p></div>`).join('<div style="height:20px;margin-left:10px;border-left:2px solid '+( i<currentIndex?'var(--gold)':'#333')+';"></div>')}</div><hr style="border:1px solid rgba(212,175,55,0.2);margin:20px 0;"><p><strong>Customer:</strong> ${order.customer_name}</p><p><strong>Phone:</strong> ${order.customer_phone}</p><p><strong>Delivery Address:</strong> ${order.shipping_address}</p><p><strong>Order Total:</strong> ₦${(order.total||0).toLocaleString()}</p><p><strong>Estimated Delivery:</strong> ${new Date(order.estimated_delivery).toLocaleDateString()}</p>`;}catch(err){console.error(err);}}setTimeout(loadTracking,1000);</script>
</body></html>
