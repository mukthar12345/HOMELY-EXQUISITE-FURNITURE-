<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0A1128; color:white; padding:20px; font-family:sans-serif;">
    <h2>Sign Up Test</h2>
    <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;"><br>
    <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; margin:5px 0;"><br>
    <input type="text" id="name" placeholder="Full Name" style="width:100%; padding:10px; margin:5px 0;"><br>
    <button id="btn" style="background:gold; color:#0A1128; padding:10px 20px; border:none; margin-top:10px;">Sign Up</button>
    <div id="result" style="margin-top:20px; white-space:pre-wrap; background:#14223d; padding:10px; border-radius:5px;"></div>

    <script>
        const SUPABASE_URL = 'https://trswmahvppkvpwhtbiyw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyc3dtYWh2cHBrdnB3aHRiaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTIwNzAsImV4cCI6MjA5NTEyODA3MH0.fgBA1qFZwn9KEYc78Odwj83j9Pq61igbStRYYNRwywc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const resultDiv = document.getElementById('result');

        document.getElementById('btn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value;
            const name = document.getElementById('name').value.trim();
            resultDiv.innerHTML = '';

            if (!email || !password || !name) {
                resultDiv.innerHTML = '❌ Please fill all fields';
                return;
            }

            resultDiv.innerHTML += '🔄 Signing up...\n';
            try {
                // Sign up
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });
                if (error) throw error;
                resultDiv.innerHTML += `✅ Signup SUCCESS. User ID: ${data.user.id}\n`;
                // Try to insert profile
                try {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([{ id: data.user.id, email, full_name: name, is_admin: false }]);
                    if (profileError) {
                        resultDiv.innerHTML += `⚠️ Profile insert failed: ${profileError.message}\n`;
                    } else {
                        resultDiv.innerHTML += `✅ Profile inserted.\n`;
                    }
                } catch (e) { resultDiv.innerHTML += `⚠️ Profile error: ${e.message}\n`; }
                resultDiv.innerHTML += `🎉 Account created! <a href="login.html" style="color:gold;">Click here to Login</a>`;
                // Hide the button after success
                document.getElementById('btn').style.display = 'none';
            } catch (err) {
                resultDiv.innerHTML += `❌ ERROR: ${err.message}\n`;
            }
        };
    </script>
</body>
</html>
