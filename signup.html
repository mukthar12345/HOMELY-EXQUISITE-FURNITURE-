<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Test - No Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #0A1128; color: white; padding: 2rem; }
        input, button { display: block; margin: 1rem 0; padding: 0.5rem; width: 250px; }
        .error { color: #ff8888; }
        .success { color: #88ff88; }
    </style>
</head>
<body>
    <h1>Signup Test (Auth only)</h1>
    <div id="message"></div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signupBtn">Sign Up</button>

    <script>
        const SUPABASE_URL = 'https://trswmahvppkvpwhtbiyw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyc3dtYWh2cHBrdnB3aHRiaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTIwNzAsImV4cCI6MjA5NTEyODA3MH0.fgBA1qFZwn9KEYc78Odwj83j9Pq61igbStRYYNRwywc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const msg = document.getElementById('message');

        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                msg.innerHTML = '<span class="error">Please fill both fields</span>';
                return;
            }
            msg.innerHTML = 'Attempting signup...';
            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            try {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;
                msg.innerHTML = `<span class="success">Success! User ID: ${data.user.id}. Check Supabase Auth → Users.</span>`;
            } catch (err) {
                msg.innerHTML = `<span class="error">Error: ${err.message}</span>`;
            }
            btn.disabled = false;
        };
    </script>
</body>
</html>
