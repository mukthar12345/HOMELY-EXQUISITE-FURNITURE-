<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign Up | Homely Exquisite</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><link rel="stylesheet" href="style.css"></head><body>
<header><div class="container"><nav class="navbar"><a href="index.html" class="logo"><i class="fas fa-home"></i> Homely<span>Exquisite</span></a><div class="nav-menu-wrapper"><button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="login.html">Login</a></li></ul></div></nav></div></header>
<section class="section"><div class="form-wrap"><h2 style="text-align:center;margin-bottom:30px;">Create Your <span class="gold-text">Account</span></h2><div id="alertBox"></div><div class="form-group"><label>Full Name *</label><input type="text" id="fullName" placeholder="Your name"></div><div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="your@email.com"></div><div class="form-group"><label>Phone *</label><input type="tel" id="phone" placeholder="0806xxx xxxx"></div><div class="form-group"><label>Password *</label><input type="password" id="password" placeholder="Min 6 characters"></div><div class="form-group"><label><input type="checkbox" id="agreeTerms"> I agree to Terms</label></div><button class="btn btn-primary" style="width:100%;padding:14px;" onclick="handleSignup()">Create Account</button><p style="text-align:center;margin-top:20px;font-size:13px;">Already have account? <a href="login.html" style="color:var(--gold);text-decoration:none;">Login</a></p></div></section>
<footer><div class="container"><div style="text-align:center;"><p><strong>Homely Exquisite</strong> | CEO: ALEX MOMOH</p><p style="font-size:12px;color:var(--gold);">📞 0706 522 9950</p></div></div></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script><script>document.getElementById('menuToggle').addEventListener('click',()=>{document.getElementById('navLinks').classList.toggle('active');});function showAlert(msg,type='success'){const alertBox=document.getElementById('alertBox');const div=document.createElement('div');div.className=`alert ${type}`;div.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i> ${msg}`;alertBox.innerHTML='';alertBox.appendChild(div);setTimeout(()=>div.remove(),5000);}async function handleSignup(){const name=document.getElementById('fullName').value.trim();const email=document.getElementById('email').value.trim();const phone=document.getElementById('phone').value.trim();const password=document.getElementById('password').value;const agree=document.getElementById('agreeTerms').checked;if(!name||!email||!phone||!password){showAlert('All fields required','error');return;}if(!validateEmail(email)){showAlert('Invalid email','error');return;}if(password.length<6){showAlert('Password min 6 chars','error');return;}if(!agree){showAlert('Agree to continue','error');return;}try{const btn=document.querySelector('.btn-primary');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Creating...';await signUp(email,password,{full_name:name,phone});showAlert('Account created!','success');setTimeout(()=>window.location.href='login.html',2000);}catch(err){showAlert(err.message,'error');document.querySelector('.btn-primary').disabled=false;document.querySelector('.btn-primary').innerHTML='Create Account';}}</script>
</body></html>
