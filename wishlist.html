<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Wishlist | Homely Exquisite</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><link rel="stylesheet" href="style.css"></head><body>
<header><div class="container"><nav class="navbar"><a href="index.html" class="logo"><i class="fas fa-home"></i> Homely<span>Exquisite</span></a><div class="nav-menu-wrapper"><button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="dashboard.html">Dashboard</a></li><li id="logoutLink"><a href="#" onclick="logOut()">Logout</a></li></ul></div></nav></div></header>
<section class="section"><div class="container"><h2>My <span class="gold-text">Wishlist</span></h2><input type="text" id="searchWishlist" placeholder="Search wishlist..." style="width:100%;max-width:500px;padding:12px 20px;background:var(--navy-light);border:1px solid rgba(212,175,55,0.3);border-radius:30px;color:#eaeaea;margin-bottom:20px;"><p style="color:#999;font-size:13px;margin-bottom:20px;"><span id="wishlistCount">0</span> items in wishlist</p><div class="products-grid" id="wishlistContainer"></div></div></section>
<footer><div class="container"><p style="text-align:center;font-size:13px;">&copy; 2024 Homely Exquisite</p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script><script>let allWishlistItems=[];async function loadWishlist(){try{const user=await checkUser();if(!user){window.location.href='login.html';return;}allWishlistItems=await getWishlist();displayWishlist(allWishlistItems);}catch(err){console.error(err);}}function displayWishlist(items){const container=document.getElementById('wishlistContainer');document.getElementById('wishlistCount').textContent=items.length;if(items.length===0){container.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;"><i class="fas fa-heart" style="font-size:48px;opacity:0.3;margin-bottom:20px;display:block;"></i><p>Wishlist is empty</p></div>';return;}container.innerHTML=items.map(item=>`<div class="product-card"><div class="product-img" style="background-image:url('${item.products.image_url||'https://via.placeholder.com/300'}')"><button class="product-wishlist active" onclick="removeFromWishlistHandler(${item.products.id},event)"><i class="fas fa-heart"></i></button></div><div class="product-info"><h3>${item.products.name}</h3><div class="price">₦${(item.products.price||0).toLocaleString()}</div><button class="btn" style="width:100%;padding:10px;" onclick="addToCartFromWishlist(${item.products.id})">Add to Cart</button></div></div>`).join('');}async function removeFromWishlistHandler(productId,event){event.preventDefault();try{await removeFromWishlist(productId);loadWishlist();}catch(err){console.error(err);}}async function addToCartFromWishlist(productId){try{const user=await checkUser();if(!user){window.location.href='login.html';return;}await addToCart(productId,1);alert('Added to cart!');}catch(err){console.error(err);}}document.getElementById('menuToggle').addEventListener('click',()=>{document.getElementById('navLinks').classList.toggle('active');});document.getElementById('searchWishlist').addEventListener('input',(e)=>{const query=e.target.value.toLowerCase();const filtered=allWishlistItems.filter(item=>item.products.name.toLowerCase().includes(query));displayWishlist(filtered);});setTimeout(loadWishlist,1000);</script>
</body></html>
