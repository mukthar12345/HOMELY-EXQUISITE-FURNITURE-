<!DOCTYPE html>
<html>
<head><title>Final Debug</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body>
<h2>Final Debug – Will show each step</h2>
<div id="log" style="background:#222; color:#0f0; padding:10px; font-family:monospace; white-space:pre-wrap;"></div>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button id="btn">Start Test</button>

<script>
const SUPABASE_URL = 'https://trswmahvppkvpwhtbiyw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyc3dtYWh2cHBrdnB3aHRiaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTIwNzAsImV4cCI6MjA5NTEyODA3MH0.fgBA1qFZwn9KEYc78Odwj83j9Pq61igbStRYYNRwywc';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const logDiv = document.getElementById('log');

function log(msg) {
    const p = document.createElement('div');
    p.textContent = new Date().toLocaleTimeString() + ': ' + msg;
    logDiv.appendChild(p);
    console.log(msg);
}

document.getElementById('btn').onclick = async () => {
    logDiv.innerHTML = '';
    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;
    if (!email || !password) { log('❌ Missing email or password'); return; }
    log('✅ Step 1: Email and password provided');
    
    log('✅ Step 2: Calling supabase.auth.signUp...');
    try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        log('✅ Step 3: Signup API succeeded. User ID: ' + data.user.id);
        
        log('✅ Step 4: Checking if profiles table exists and inserting...');
        const { error: profileError } = await supabase
            .from('profiles')
            .insert([{ id: data.user.id, email, full_name: 'Debug User', is_admin: false }]);
        if (profileError) {
            log('❌ Step 5: Profile insert FAILED: ' + profileError.message);
            log('❌ Most likely: RLS policy missing or profiles table missing.');
        } else {
            log('✅ Step 5: Profile inserted successfully!');
            log('✅ Step 6: Redirecting to login.html in 2 seconds...');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
    } catch (err) {
        log('❌ Error in signup API: ' + err.message);
    }
};
</script>
</body>
</html>
