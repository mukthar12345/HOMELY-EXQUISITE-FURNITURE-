<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shop | Homely Exquisite Furniture</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script></head>
<body>
<header><div class="container"><nav><div class="logo">Homely<span>Exquisite</span></div><button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="shop.html" class="active">Shop</a></li><li><a href="dashboard.html">Dashboard</a></li><li><a href="login.html">Login</a></li><li class="cart-icon"><a href="#"><i class="fas fa-shopping-cart"></i> Cart <span id="cartCount">0</span></a></li></ul></nav></div></header>
<main><div class="container"><h1 style="text-align:center">All <span class="gold-text">Products</span></h1><div class="gold-border-center"></div><div class="search-bar"><input type="text" id="searchInput" placeholder="Search furniture..."></div><div class="filter-section"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="interior">Interior</button><button class="filter-btn" data-filter="exterior">Exterior</button></div><div class="products-grid" id="productsGrid"><p>Loading...</p></div></div></main>
<footer><div class="container"><div class="footer-content"><div class="footer-col"><div class="logo">Homely<span>Exquisite</span></div><p>Expression of style & beauty — established 18 years ago.</p></div><div class="footer-col"><h4>Quick Links</h4><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="dashboard.html">Dashboard</a></div><div class="footer-col"><h4>Contact</h4><a href="tel:07065229950">0706 522 9950</a><a href="tel:08084202903">0808 420 2903</a></div></div><div class="copyright"><p>© 2025 Homely Exquisite Furniture. 18 years of excellence.</p></div></div></footer>
<script>
let allProducts = [], currentFilter = 'all', currentSearch = '';
async function loadProducts() { allProducts = await getProducts('all'); renderProducts(); }
function renderProducts() {
    let filtered = allProducts.filter(p => currentFilter === 'all' || p.category === currentFilter);
    if (currentSearch) filtered = filtered.filter(p => p.name.toLowerCase().includes(currentSearch.toLowerCase()));
    const grid = document.getElementById('productsGrid');
    if (filtered.length === 0) { grid.innerHTML = '<p>No products found.</p>'; return; }
    grid.innerHTML = filtered.map(p => `<div class="product-card"><div class="product-img" style="background-image:url('${p.image_url || 'https://placehold.co/400x300/0A1128/D4AF37?text=No+Image'}')">${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}</div><div class="product-info"><h3>${p.name}</h3><div class="price">₦${p.price.toLocaleString()}</div><button class="btn" onclick="addToCartAndRedirect(${p.id})">Add to Cart</button></div></div>`).join('');
}
window.addToCartAndRedirect = async (id) => { await addToCart(id); window.location.href = 'dashboard.html'; };
document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderProducts(); }));
document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; renderProducts(); });
document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('show'));
loadProducts(); updateCartCountDisplay();
</script>
</body>
</html>
