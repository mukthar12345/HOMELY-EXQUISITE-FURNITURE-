<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body style="background:#0A1128; color:white; padding:20px;">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" style="width:100%; padding:8px; margin:5px 0;"><br>
    <input type="password" id="pass" placeholder="Password" style="width:100%; padding:8px; margin:5px 0;"><br>
    <button id="btn" style="background:gold; color:#0A1128; padding:8px 15px;">Login</button>
    <div id="result" style="margin-top:20px; background:#14223d; padding:10px;"></div>
    <script>
        const supabase = window.supabase.createClient(
            'https://trswmahvppkvpwhtbiyw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyc3dtYWh2cHBrdnB3aHRiaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTIwNzAsImV4cCI6MjA5NTEyODA3MH0.fgBA1qFZwn9KEYc78Odwj83j9Pq61igbStRYYNRwywc'
        );
        document.getElementById('btn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            if (!email || !password) { resultDiv.innerHTML = '❌ Please fill both fields'; return; }
            resultDiv.innerHTML = '🔄 Logging in...\n';
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                resultDiv.innerHTML += `✅ Login successful! User ID: ${data.user.id}\n`;
                resultDiv.innerHTML += `<a href="dashboard.html" style="color:gold;">Go to Dashboard</a>`;
            } catch (err) {
                resultDiv.innerHTML += `❌ ERROR: ${err.message}`;
            }
        };
    </script>
</body>
</html>
