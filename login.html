<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login | Homely Exquisite</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><link rel="stylesheet" href="style.css"></head><body>
<header><div class="container"><nav class="navbar"><a href="index.html" class="logo"><i class="fas fa-home"></i> Homely<span>Exquisite</span></a><div class="nav-menu-wrapper"><button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="signup.html">Sign Up</a></li></ul></div></nav></div></header>
<section class="section"><div class="form-wrap"><h2 style="text-align:center;margin-bottom:30px;">Welcome <span class="gold-text">Back</span></h2><div id="alertBox"></div><div class="form-group"><label>Email</label><input type="email" id="email" placeholder="your@email.com"></div><div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password"></div><button class="btn btn-primary" style="width:100%;padding:14px;" onclick="handleLogin()">Login</button><p style="text-align:center;margin-top:15px;font-size:13px;"><a href="#" onclick="showForgotPassword()" style="color:var(--gold);text-decoration:none;">Forgot Password?</a></p><p style="text-align:center;margin-top:20px;font-size:13px;">No account? <a href="signup.html" style="color:var(--gold);text-decoration:none;">Sign Up</a></p></div></section>
<footer><div class="container"><div style="text-align:center;"><p><strong>Homely Exquisite</strong> | CEO: ALEX MOMOH</p></div></div></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script><script>document.getElementById('menuToggle').addEventListener('click',()=>{document.getElementById('navLinks').classList.toggle('active');});function showAlert(msg,type='success'){const alertBox=document.getElementById('alertBox');const div=document.createElement('div');div.className=`alert ${type}`;div.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i> ${msg}`;alertBox.innerHTML='';alertBox.appendChild(div);setTimeout(()=>div.remove(),5000);}async function handleLogin(){const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;if(!email||!password){showAlert('Email and password required','error');return;}try{const btn=document.querySelector('.btn-primary');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Logging in...';await logIn(email,password);const profile=await getUserProfile();showAlert('Login successful!','success');setTimeout(()=>{if(profile.is_admin){window.location.href='ceo-dashboard.html';}else{window.location.href='dashboard.html';}},1500);}catch(err){showAlert(err.message||'Login failed','error');document.querySelector('.btn-primary').disabled=false;document.querySelector('.btn-primary').innerHTML='Login';}}function showForgotPassword(){const email=prompt('Enter your email to reset password:');if(email){resetPassword(email).then(()=>{showAlert('Reset email sent!','success');}).catch(err=>{showAlert(err.message,'error');});}}document.getElementById('password').addEventListener('keypress',(e)=>{if(e.key==='Enter') handleLogin();});</script>
</body></html>
