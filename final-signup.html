<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign Up Final</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body style="background:#0A1128; color:white; padding:20px;">
    <h2>Sign Up</h2>
    <input id="name" placeholder="Full Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="phone" placeholder="Phone"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <input id="confirm" type="password" placeholder="Confirm"><br>
    <button id="btn">Sign Up</button>
    <div id="msg" style="margin-top:20px;"></div>
    <script>
        const supabase = window.supabase.createClient(
            'https://trswmahvppkvpwhtbiyw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyc3dtYWh2cHBrdnB3aHRiaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTIwNzAsImV4cCI6MjA5NTEyODA3MH0.fgBA1qFZwn9KEYc78Odwj83j9Pq61igbStRYYNRwywc'
        );
        document.getElementById('btn').onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('confirm').value;
            const msgDiv = document.getElementById('msg');
            msgDiv.innerHTML = '';
            if (!name || !email || !pass) { msgDiv.innerHTML = '❌ Fill all required fields.'; return; }
            if (pass !== confirm) { msgDiv.innerHTML = '❌ Passwords do not match.'; return; }
            if (pass.length < 6) { msgDiv.innerHTML = '❌ Password must be at least 6 characters.'; return; }
            const btn = document.getElementById('btn');
            btn.disabled = true; btn.innerText = 'Creating...';
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password: pass,
                    options: { data: { full_name: name, phone } }
                });
                if (error) throw error;
                msgDiv.innerHTML = '✅ Account created! <a href="login.html" style="color:gold;">Click here to Login</a>';
                btn.style.display = 'none';
            } catch (err) {
                msgDiv.innerHTML = '❌ ' + err.message;
                btn.disabled = false; btn.innerText = 'Sign Up';
            }
        };
    </script>
</body>
</html>
