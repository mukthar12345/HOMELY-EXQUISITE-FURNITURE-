<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Signup Test</title>
</head>
<body>
    <h2>Signup Test</h2>
    <div id="status">Loading Supabase...</div>
    <div id="form" style="display:none;">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button id="btn">Sign Up</button>
    </div>
    <div id="result" style="margin-top:20px; white-space:pre-wrap; font-family:monospace;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const statusDiv = document.getElementById('status');
        const formDiv = document.getElementById('form');
        const resultDiv = document.getElementById('result');

        // Check if supabase loaded
        if (typeof supabase !== 'undefined') {
            statusDiv.innerHTML = '✅ Supabase loaded. Ready.';
            formDiv.style.display = 'block';
        } else {
            statusDiv.innerHTML = '❌ Supabase NOT loaded. Check internet or try a different browser.';
        }

        // Only add event listener if supabase exists
        if (typeof supabase !== 'undefined') {
            const SUPABASE_URL = 'https://trswmahvppkvpwhtbiyw.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyc3dtYWh2cHBrdnB3aHRiaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTIwNzAsImV4cCI6MjA5NTEyODA3MH0.fgBA1qFZwn9KEYc78Odwj83j9Pq61igbStRYYNRwywc';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            document.getElementById('btn').onclick = async () => {
                const email = document.getElementById('email').value.trim();
                const pass = document.getElementById('pass').value;
                resultDiv.innerHTML = '';
                if (!email || !pass) {
                    resultDiv.innerHTML = 'Please enter email and password.';
                    return;
                }
                resultDiv.innerHTML = 'Attempting signup for: ' + email + '\n';
                try {
                    const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
                    if (error) throw error;
                    resultDiv.innerHTML += '✅ Signup API succeeded. User ID: ' + data.user.id + '\n';
                    // Try to insert profile (optional)
                    const { error: profileError } = await supabaseClient
                        .from('profiles')
                        .insert([{ id: data.user.id, email, full_name: 'Test', is_admin: false }]);
                    if (profileError) {
                        resultDiv.innerHTML += '⚠️ Profile insert error: ' + profileError.message + '\n';
                    } else {
                        resultDiv.innerHTML += '✅ Profile inserted.\n';
                    }
                    resultDiv.innerHTML += '🎉 Signup complete! You can now log in.';
                } catch (err) {
                    resultDiv.innerHTML += '❌ ERROR: ' + err.message;
                }
            };
        }
    </script>
</body>
</html>
